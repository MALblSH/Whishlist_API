services:
  postgres:
    image: postgres:16
    container_name: wishlist_pg
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wishlist
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build:
      context: .
      dockerfile: docker/wishlist.Dockerfile
    container_name: wishlist_app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    env_file:
      - .env
volumes:
  postgres_data: